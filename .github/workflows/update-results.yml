name: Auto-update results

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch and update results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-results.mjs
      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Auto-update fixture scores"
          branch: auto/update-results
          title: "Auto-update fixture scores"
          body: |
            Scores pulled from football-data.org.

            Review the diff and merge to publish.
          delete-branch: true
